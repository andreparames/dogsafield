name: CI

on:
  push:
    branches: [master, initial-scaffold]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.0
          cache: true

      - run: flutter pub get

      - run: flutter test

      - run: flutter analyze
