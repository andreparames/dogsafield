name: CI

on:
  push:
    branches: [master, initial-scaffold]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cirruslabs/flutter-action@v1
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - run: flutter test

      - run: flutter analyze
