name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Flutter SDK
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: /opt/flutter
          key: flutter-3.29.3-${{ runner.os }}

      - name: Install Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl git unzip xz-utils zip libglu1-mesa
          git clone --depth 1 -b 3.29.3 https://github.com/flutter/flutter.git /opt/flutter

      - name: Add Flutter to PATH
        run: echo "/opt/flutter/bin" >> $GITHUB_PATH

      - run: flutter pub get

      - run: flutter test

      - run: flutter analyze

  build-apk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    env:
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Cache Flutter SDK
        id: cache-flutter
        uses: actions/cache@v4
        with:
          path: /opt/flutter
          key: flutter-3.29.3-${{ runner.os }}

      - name: Install Flutter
        if: steps.cache-flutter.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl git unzip xz-utils zip libglu1-mesa
          git clone --depth 1 -b 3.29.3 https://github.com/flutter/flutter.git /opt/flutter

      - name: Add Flutter to PATH
        run: echo "/opt/flutter/bin" >> $GITHUB_PATH

      - run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug --dart-define=SUPABASE_URL=https://noxyxxzetsrtkvrgpheq.supabase.co --dart-define=SUPABASE_PUB_KEY=sb_publishable_4myRJqQA46l6bvIa7VfOXw_Z-o6Hp4-

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
