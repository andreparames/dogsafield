name: Supabase Migrations

on:
  push:
    branches: [main, master, develop]

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - uses: supabase/setup-cli@v3
        with:
          version: latest

      - name: Validate migrations locally
        run: |
          supabase db start
          supabase db reset

      - name: Select target environment
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "develop" ]; then
            echo "project_id=${{ secrets.STAGING_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "db_password=${{ secrets.STAGING_DB_PASSWORD }}" >> "$GITHUB_OUTPUT"
          else
            echo "project_id=${{ secrets.SUPABASE_PROJECT_ID }}" >> "$GITHUB_OUTPUT"
            echo "db_password=" >> "$GITHUB_OUTPUT"
          fi

      - name: Link project
        run: supabase link --project-ref "${{ steps.target.outputs.project_id }}"
        env:
          SUPABASE_DB_PASSWORD: ${{ steps.target.outputs.db_password }}

      - name: Apply pending migrations
        run: supabase db push --linked
