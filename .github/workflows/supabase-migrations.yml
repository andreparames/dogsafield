name: Supabase Migrations

on:
  push:
    branches: [main, master]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
