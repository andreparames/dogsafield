name: Coderabbit Review Trigger

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            core.info(`Found ${prs.length} open PR(s): ${prs.map(p => `#${p.number} - ${p.title}`).join(', ')}`);

            for (const pr of prs) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });

              // Find the most recent cooldown comment from Coderabbit
              let cooldownComment = null;
              let cooldownMinutes = 0;

              for (const comment of comments) {
                const match = comment.body.match(/\*{0,2}Next review available in:\*{0,2}\s*\*{0,2}(\d+)\s*\*{0,2}minutes?/i);
                if (match) {
                  if (!cooldownComment || new Date(comment.updated_at) > new Date(cooldownComment.updated_at)) {
                    cooldownComment = comment;
                    cooldownMinutes = parseInt(match[1], 10);
                  }
                }
              }

              if (!cooldownComment) { core.info(`PR #${pr.number}: no cooldown comment found, skipping`); continue; }

              const elapsed = Date.now() - new Date(cooldownComment.updated_at).getTime();
              if (elapsed < cooldownMinutes * 60 * 1000) { core.info(`PR #${pr.number}: cooldown still active (${cooldownMinutes}m), skipping`); continue; }

              // Don't re-trigger if we already asked for a review after this cooldown message
              const alreadyTriggered = comments.some(c =>
                c.body.includes('@coderabbitai review') &&
                new Date(c.created_at) > new Date(cooldownComment.updated_at)
              );

              if (alreadyTriggered) { core.info(`PR #${pr.number}: review already requested after cooldown, skipping`); continue; }

              core.info(`PR #${pr.number}: posting "@coderabbitai review" comment`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: '@coderabbitai review'
              });
              core.info(`PR #${pr.number}: review comment posted successfully`);
              break;
            }
